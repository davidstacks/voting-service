services:
  gvote:
    image: 3289david/gvote:latest
    container_name: gvote
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - gvote_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Generate a strong secret: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET:-change_this_to_a_strong_random_secret}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gvote_data:
    driver: local
